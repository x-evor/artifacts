name: release-oci-charts

on:
  push:
    branches:
      - main
    paths:
      - "oci/charts/apps/app-service/**"
      - "oci/charts/infra/platform/k3s/**"
      - "oci/charts/postgresql/**"
      - "oci/charts/observability/**"
      - ".github/workflows/release-oci-charts.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Lint charts
        run: |
          set -euo pipefail
          charts=(
            "oci/charts/apps/app-service"
            "oci/charts/infra/platform/k3s"
            "oci/charts/postgresql"
            "oci/charts/observability"
          )
          for chart in "${charts[@]}"; do
            helm lint "./${chart}"
          done

      - name: Package charts
        run: |
          set -euo pipefail
          mkdir -p dist
          charts=(
            "oci/charts/apps/app-service"
            "oci/charts/infra/platform/k3s"
            "oci/charts/postgresql"
            "oci/charts/observability"
          )
          for chart in "${charts[@]}"; do
            helm package "./${chart}" --destination dist
          done

      - name: Push charts to GHCR
        run: |
          set -euo pipefail
          for pkg in dist/*.tgz; do
            helm push "${pkg}" oci://ghcr.io/x-evor/charts
          done
