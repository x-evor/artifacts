nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

command: []
args: []
workingDir: ""

containerPort: 8080

service:
  port: 80
  type: ClusterIP
  annotations: {}

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

podLabels: {}
podAnnotations: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}

global:
  repository: ""
  tag: ""
  env: {}
  existingSecretName: ""
  external-service: []
  envFromSecretRefs: []

# Local overrides remain available for backwards compatibility.
env: {}
existingSecretName: ""
external-service: []
envFromSecretRefs: []
initContainers: []
extraContainers: []
volumeMounts: []
volumes: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 30
  periodSeconds: 20

pdb:
  enabled: true
  minAvailable: 1

ingress:
  enabled: false
  className: ""
  annotations: {}
  tls: []
  hosts: []

nodeSelector: {}
tolerations: []
affinity: {}

reloader:
  enabled: true
  secretMatch: ""
